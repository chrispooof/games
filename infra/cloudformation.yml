AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB table for card game state (single-table design)

Parameters:
  TableName:
    Type: String
    Default: CardGames
    Description: Name of the DynamoDB table

Resources:
  CardGamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: games

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref CardGamesTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt CardGamesTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"
